server {
    listen        80;
    server_name  test;
    root   "C:/phpstudy_pro/WWW/test/dist"; 
    
    location / {
        index index.html;
        try_files $uri $uri/ =404;
    }
    

    location /api {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}